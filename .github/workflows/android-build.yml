name: Android Build Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate-build:
    name: Validate Android Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Validate versionCode bump
        run: |
          CURRENT=$(grep -E "^\s*versionCode\s+[0-9]+" android/app/build.gradle | grep -oE "[0-9]+" | head -1)
          if [ -z "$CURRENT" ]; then
            echo "❌ ERRO: Não foi possível ler versionCode atual de android/app/build.gradle."
            exit 1
          fi
          echo "versionCode atual: $CURRENT"

          # Tenta ler versionCode do commit anterior. Se não houver (primeiro commit, shallow), apenas avisa.
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            PREVIOUS=$(git show HEAD~1:android/app/build.gradle 2>/dev/null | grep -E "^\s*versionCode\s+[0-9]+" | grep -oE "[0-9]+" | head -1)
            if [ -z "$PREVIOUS" ]; then
              echo "⚠️  Aviso: commit anterior não tinha versionCode legível. Pulando comparação."
              exit 0
            fi
            echo "versionCode anterior: $PREVIOUS"

            # Só exige bump se o build.gradle realmente mudou neste commit
            if git diff --name-only HEAD~1 HEAD | grep -q "^android/app/build.gradle$"; then
              if [ "$CURRENT" -le "$PREVIOUS" ]; then
                echo "❌ ERRO: android/app/build.gradle foi alterado mas versionCode não foi incrementado."
                echo "   Anterior: $PREVIOUS | Atual: $CURRENT"
                echo "   Antes de gerar AAB de release, bumpe versionCode (e idealmente versionName)."
                exit 1
              fi
              echo "✅ versionCode incrementado corretamente ($PREVIOUS → $CURRENT)."
            else
              echo "ℹ️  build.gradle não mudou neste commit. Bump não é obrigatório agora."
            fi
          else
            echo "ℹ️  Sem commit anterior disponível. Pulando validação de bump."
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm ci

      - name: Validate capacitor.config.ts (no server.url)
        run: |
          if grep -E "^[[:space:]]*url[[:space:]]*:" capacitor.config.ts | grep -v "^[[:space:]]*//" > /dev/null; then
            echo "❌ ERRO: capacitor.config.ts contém 'server.url'."
            echo "   Builds de release devem ser 100% offline."
            exit 1
          fi
          echo "✅ capacitor.config.ts OK (sem server.url)."

      - name: Build web project
        run: npm run build

      - name: Validate dist/ output
        run: |
          if [ ! -f "dist/index.html" ]; then
            echo "❌ ERRO: dist/index.html não encontrado."
            exit 1
          fi
          if grep -E '(src|href)="https?://[^"]*\.(lovable\.app|lovableproject\.com|lovable\.dev)' dist/index.html > /dev/null; then
            echo "❌ ERRO: dist/index.html contém referências a domínios Lovable remotos."
            grep -nE '(src|href)="https?://[^"]*\.(lovable\.app|lovableproject\.com|lovable\.dev)' dist/index.html || true
            exit 1
          fi
          echo "✅ dist/ validado."

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Validate synced assets
        run: |
          SYNCED_INDEX="android/app/src/main/assets/public/index.html"
          if [ ! -f "$SYNCED_INDEX" ]; then
            echo "❌ ERRO: '$SYNCED_INDEX' não foi gerado."
            exit 1
          fi
          echo "✅ Assets nativos sincronizados."

      - name: Build Android (assembleDebug — sem keystore necessário)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
